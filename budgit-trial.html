<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef0f3;
  --surface:#ffffff;
  --surface2:#f4f5f7;
  --surface3:#e8eaed;
  --border:#d0d4da;
  --border2:#b0b6be;
  --accent:#00c49a;
  --accent-dark:#009e7c;
  --accent-light:#e0faf4;
  --sidebar:#1c2b3a;
  --sidebar2:#243547;
  --text:#1c2b3a;
  --text2:#4a5568;
  --text3:#8a96a3;
  --income:#00c49a;
  --expense:#e05252;
  --remainder:#3a7bd5;
  --shadow:0 2px 12px rgba(28,43,58,0.08);
  --shadow2:0 8px 32px rgba(28,43,58,0.14);
  --radius:10px;
  --radius-sm:6px;
  --font-display:'Inter',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;}
.app{display:flex;height:100vh;overflow:hidden;position:relative;}

/* SIDEBAR */
.sidebar{width:240px;min-width:240px;background:var(--sidebar);display:flex;flex-direction:column;overflow:hidden;transition:transform 0.25s cubic-bezier(0.4,0,0.2,1),width 0.25s cubic-bezier(0.4,0,0.2,1);z-index:50;flex-shrink:0;}
.sidebar-logo{padding:20px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:row;align-items:center;gap:12px;}
.sidebar-logo-img{width:44px;height:44px;border-radius:8px;object-fit:cover;display:block;flex-shrink:0;}
.sidebar-logo h1{font-family:var(--font-display);font-size:20px;color:#fff;font-weight:700;letter-spacing:-0.4px;line-height:1;}
.sidebar-logo .tagline{font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:2px;text-transform:uppercase;font-family:var(--font-mono);margin-top:3px;}
.sidebar-nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:background 0.15s;font-size:13.5px;font-weight:500;color:rgba(255,255,255,0.5);user-select:none;}
.nav-item:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85);}
.nav-item.active{background:var(--accent);color:#fff;}
.nav-item .nav-icon{display:flex;align-items:center;justify-content:center;width:20px;flex-shrink:0;}
.nav-item .nav-count{margin-left:auto;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);font-family:var(--font-mono);font-size:11px;padding:1px 7px;border-radius:20px;}
.nav-item.active .nav-count{background:rgba(255,255,255,0.2);color:#fff;}
.nav-divider{height:1px;background:rgba(255,255,255,0.08);margin:8px 0;}
.nav-danger{color:rgba(224,82,82,0.7)!important;}
.nav-danger:hover{background:rgba(224,82,82,0.15)!important;color:rgba(224,82,82,1)!important;}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.08);}
.sidebar-footer p{font-size:11px;color:rgba(255,255,255,0.2);font-family:var(--font-mono);}
/* Sidebar overlay for mobile */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:40;backdrop-filter:blur(2px);}
.sidebar-overlay.visible{display:block;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);min-width:0;}
.topbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface);min-height:58px;flex-wrap:wrap;}
.topbar h2{font-family:var(--font-display);font-size:19px;color:var(--text);flex:1;min-width:0;}
.content{flex:1;overflow-y:auto;padding:20px 20px;}
/* Hamburger button */
.hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;background:none;border:none;cursor:pointer;padding:6px 8px;border-radius:var(--radius-sm);margin-right:4px;}
.hamburger span{display:block;width:20px;height:2px;background:var(--text2);border-radius:2px;transition:all 0.2s;}
.hamburger:hover span{background:var(--text);}

/* ACCOUNT SELECTOR */
.account-selector-wrap{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);}
.account-selector-wrap select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;font-family:var(--font-body);font-size:13px;color:var(--text);outline:none;cursor:pointer;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.btn-download{display:flex;align-items:center;gap:7px;padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-body);transition:background 0.15s;white-space:nowrap;}
.btn-download:hover{background:var(--accent-dark);}
.btn-download .dl-icon{font-size:14px;}
.btn-share{display:flex;align-items:center;gap:7px;padding:7px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-body);transition:all 0.15s;white-space:nowrap;color:var(--text2);}
.btn-share:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}

/* DASHBOARD */
.dashboard-grid{display:grid;gap:16px;}
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;box-shadow:var(--shadow);}
.kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);margin-bottom:6px;}
.kpi-value{font-family:var(--font-mono);font-size:26px;font-weight:500;color:var(--accent);}
.kpi-value.negative{color:var(--expense);}
.kpi-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.kpi-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 12px;font-size:12px;cursor:pointer;color:var(--text2);transition:all 0.15s;font-family:var(--font-body);}
.kpi-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}

.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);min-width:0;}
.chart-card h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);margin-bottom:14px;}
.chart-card-full{grid-column:1/-1;}
.chart-container{position:relative;overflow:hidden;width:100%;}

.budget-summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;}
.summary-card .kpi-value{font-size:18px;}

/* TABLES */
.sheet-container{display:flex;flex-direction:column;gap:14px;}
.sheet-toolbar{display:flex;gap:10px;align-items:center;}
.bulk-bar{display:flex;align-items:center;gap:10px;background:var(--income-bg,rgba(0,196,154,.08));border:1px solid var(--income);border-radius:var(--radius-sm);padding:8px 14px;margin-bottom:0;font-size:13px;color:var(--income-dark,var(--income));font-weight:500;flex-wrap:wrap}
.bulk-bar span{margin-right:4px}
.bulk-btn{padding:5px 13px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--font-body);transition:all .15s}
.bulk-btn-delete{background:var(--expense);color:#fff}
.bulk-btn-delete:hover{background:#c0392b}
.bulk-btn-clear{background:none;border:1px solid var(--income);color:var(--income)}
.bulk-btn-clear:hover{background:var(--income);color:#fff}
.cb{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
.btn{padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:var(--font-body);border:none;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-dark);}
.btn-secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text2);}
.btn-secondary:hover{border-color:var(--border2);color:var(--text);}
.btn-danger{background:rgba(224,82,82,0.1);border:1px solid rgba(224,82,82,0.3);color:var(--expense);}
.btn-danger:hover{background:rgba(224,82,82,0.2);}
.btn-sm{padding:5px 11px;font-size:12px;}
.icon-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 9px;cursor:pointer;color:var(--text3);transition:all 0.15s;font-size:13px;line-height:1;}
.icon-btn:hover{border-color:var(--border2);color:var(--text);}
.icon-btn.danger:hover{border-color:var(--expense);color:var(--expense);}

.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:560px;}
thead tr{background:var(--surface2);}
th{padding:9px 14px;text-align:left;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.td-name{color:var(--text);font-weight:500;}
.td-mono{font-family:var(--font-mono);font-size:12px;}
.td-income{color:var(--income);font-family:var(--font-mono);font-size:12.5px;}
.td-expense{color:var(--expense);font-family:var(--font-mono);font-size:12.5px;}
.td-actions{display:flex;gap:6px;}
.ellipsis-wrap{display:inline-block}
.ellipsis-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 10px;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;transition:all .15s;letter-spacing:1px}
.ellipsis-btn:hover{border-color:var(--border2);color:var(--text);background:var(--surface2)}
.ellipsis-btn.active{border-color:var(--accent);color:var(--accent);background:var(--income-bg,rgba(0,196,154,.08))}
#floatingMenu{display:none;position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow2);z-index:9999;min-width:160px;padding:4px 0;white-space:nowrap}
#floatingMenu button{display:flex;align-items:center;gap:10px;width:100%;padding:8px 14px;background:none;border:none;cursor:pointer;font-size:13px;font-family:var(--font-body);color:var(--text2);text-align:left;transition:background .1s}
#floatingMenu button:hover{background:var(--surface2);color:var(--text)}
#floatingMenu button.danger{color:var(--expense)}
#floatingMenu button.danger:hover{background:rgba(224,82,82,.08)}
#floatingMenu .menu-icon{font-size:16px;width:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ellipsis-divider{height:1px;background:var(--border);margin:4px 0}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;}
.badge-income{background:rgba(0,196,154,0.12);color:var(--income);}
.badge-expense{background:rgba(224,82,82,0.12);color:var(--expense);}
.badge-freq{background:rgba(58,123,213,0.12);color:var(--remainder);}
.empty-state{padding:44px 24px;text-align:center;color:var(--text3);}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:0.4;}
.empty-state p{font-size:13px;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(28,43,58,0.55);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);animation:fadeIn 0.15s ease;padding:16px;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:460px;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow2);animation:slideUp 0.2s cubic-bezier(0.34,1.4,0.64,1);}
.modal h3{font-family:var(--font-display);font-size:17px;font-weight:700;margin-bottom:18px;color:var(--text);flex-shrink:0;}
.modal-body{overflow-y:auto;flex:1;padding-right:4px;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;flex-shrink:0;padding-top:14px;border-top:1px solid var(--border);}
.confirm-text{font-size:14px;color:var(--text2);padding-bottom:4px;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px) scale(0.97)}to{opacity:1;transform:none}}

/* FORMS */
.form-grid{display:grid;gap:13px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);}

// ── ELECTRON AUTO-SAVE BRIDGE ─────────────────────────────────────────────────
// NOTE: autoSave() and render-wrapping run AFTER the page fully loads
// so that render() and the state object are guaranteed to exist.

var _autoSaveTimer = null;

function autoSave() {
  if (!window.electronAPI) {
    if (typeof hideLoader === 'function') hideLoader();
    return;
  }
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(function() {
    // Budg!t uses a single `state` object — save it directly
    if (typeof state === 'undefined') return;
    var payload = {
      accounts:  state.accounts,
      incomes:   state.incomes,
      expenses:  state.expenses,
      variables: state.variables,
      selectedAccount: state.selectedAccount,
      language: state.language,
      bankConnections: state.bankConnections,
      lastBalanceFetchDate: state.lastBalanceFetchDate
    };
    window.electronAPI.saveData(payload)
      .catch(function(e) { console.error('Auto-save error:', e); });
  }, 400);
}

// Use window.onload (fires after all scripts have run) instead of
// DOMContentLoaded so that render() is definitely defined
window.addEventListener('load', function() {
  if (!window.electronAPI) {
    if (typeof hideLoader === 'function') hideLoader();
    return;
  }

  // 1. Load saved data and restore into state
  window.electronAPI.loadData().then(function(saved) {
    if (saved && typeof state !== 'undefined') {
      try {
        if (saved.accounts)         state.accounts         = saved.accounts;
        if (saved.incomes)          state.incomes          = saved.incomes;
        if (saved.expenses)         state.expenses         = saved.expenses;
        if (saved.variables)        state.variables        = saved.variables;
        if (saved.selectedAccount)  state.selectedAccount  = saved.selectedAccount;
        if (saved.language)         state.language         = saved.language;
        if (saved.bankConnections)  state.bankConnections  = saved.bankConnections;
        if (saved.lastBalanceFetchDate) state.lastBalanceFetchDate = saved.lastBalanceFetchDate;
      } catch(e) { console.error('Load error:', e); }
    }

    // 2. Clean up any duplicate bank accounts that may have been persisted
    if (typeof deduplicateBankAccounts === 'function') deduplicateBankAccounts();

    // 3. Wrap render() AFTER load so it exists for sure
    if (typeof render === 'function' && !render._autoSaveWrapped) {
      var _orig = render;
      render = function() { _orig(); autoSave(); };
      render._autoSaveWrapped = true;
    }

    // 3. Re-render with loaded data then hide loader
    if (typeof render === 'function') render();
    if (typeof hideLoader === 'function') hideLoader();
  });
});
</script>

    _loaderPct = Math.min(_loaderPct + Math.random() * 18, 85);
    var bar = document.getElementById('loaderBar');
    if (bar) bar.style.width = _loaderPct + '%';

// t() — get translated string for current language
function t(key){ return (T[state.language]||T.en)[key]||T.en[key]||key; }

// ─── SORT STATE ───────────────────────────────────────────────────────────────
const sortState = { accounts:{col:null,dir:1}, income:{col:null,dir:1}, expenses:{col:null,dir:1}, variable:{col:null,dir:1} };

function sortBy(sheet, col) {
  if(sortState[sheet].col===col){ sortState[sheet].dir *= -1; }
  else { sortState[sheet].col=col; sortState[sheet].dir=1; }
  render();
}

function applySortArr(arr, sheet, colMap) {
  const {col, dir} = sortState[sheet];
  if(!col) return [...arr];
  return [...arr].sort((a,b)=>{
    let av = colMap(a,col), bv = colMap(b,col);
    // Date sort — detect YYYY-MM-DD or date-like strings
    const isDate = s => s && typeof s === 'string' && /^\d{4}-\d{2}-\d{2}/.test(s);
    if(isDate(av) && isDate(bv)){
      return (new Date(av).getTime() - new Date(bv).getTime()) * dir;
    }
    // numeric sort
    const an = parseFloat(String(av).replace(/[^0-9.-]/g,''));
    const bn = parseFloat(String(bv).replace(/[^0-9.-]/g,''));
    if(!isNaN(an)&&!isNaN(bn)){ return (an-bn)*dir; }
    return String(av||'').localeCompare(String(bv||''))*dir;
  });
}

function thSort(sheet, col, label) {
  const s = sortState[sheet];
  const cls = s.col===col ? (s.dir===1?'sort-asc':'sort-desc') : '';
  return `<th class="sortable ${cls}" onclick="sortBy('${sheet}','${col}')">${label}<span class="sort-icon"></span></th>`;
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const fmt = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(n||0);
// parseDate: always parse YYYY-MM-DD as LOCAL midnight, never UTC
const parseDate = d => {
  if(!d) return null;
  if(d instanceof Date) return d;
  const s = String(d);
  // ISO string with time component — use as-is
  if(s.includes('T')) return new Date(s);
  // YYYY-MM-DD — parse parts directly to avoid UTC shift
  const p = s.split('-');
  if(p.length===3) return new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
  return new Date(s);
};
const fmtD = d => {
  if(!d) return '';
  const dt = parseDate(d);
  if(!dt||isNaN(dt)) return '';
  return `${dt.getMonth()+1}/${dt.getDate()}/${dt.getFullYear()}`;
};
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const addMonths = (d,n) => { const r=new Date(d); r.setMonth(r.getMonth()+n); return r; };
const eom = (d,o=0) => new Date(d.getFullYear(), d.getMonth()+1+o, 0);
const today = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
let chartInstances = {};

function destroyChart(id) { if(chartInstances[id]){ chartInstances[id].destroy(); delete chartInstances[id]; } }

// ─── RECURRENCE ENGINE ────────────────────────────────────────────────────────
function expandRecurring(entry, type) {
  const { account, frequency, max, startDate, nextDate, endDate } = entry;
  if (!nextDate || !account || !frequency || !max) return [];
  const sign = type === 'expense' ? -1 : 1;
  const amount = parseFloat(max) * sign;
  const next = parseDate(nextDate); next.setHours(0,0,0,0);
  const start = startDate ? parseDate(startDate) : null;
  const end = endDate ? parseDate(endDate) : null;
  const results = [];
  const add = d => results.push({ account, amount, date: new Date(d) });
  add(next);
  // Daily gets up to 366 forward occurrences; others get 52
  const fwdLimit = frequency === 'Daily' ? 366 : 52;
  const totalLimit = frequency === 'Daily' ? 730 : 104;
  let fwd = new Date(next), fc = 0;
  while (fc < fwdLimit) {
    if      (frequency==='Daily')         fwd=addDays(fwd,1);
    else if (frequency==='Weekly')        fwd=addDays(fwd,7);
    else if (frequency==='Every 2 Weeks') fwd=addDays(fwd,14);
    else if (frequency==='Monthly')       fwd=addMonths(fwd,1);
    else if (frequency==='Quarterly')     fwd=addMonths(fwd,3);
    else if (frequency==='Annually')      fwd=addMonths(fwd,12);
    if (end && fwd>end) break;
    add(fwd); fc++;
  }
  let bwd = new Date(next), bc = fc+1;
  while (bc<=totalLimit && start && bwd>start) {
    if      (frequency==='Daily')         bwd=addDays(bwd,-1);
    else if (frequency==='Weekly')        bwd=addDays(bwd,-7);
    else if (frequency==='Every 2 Weeks') bwd=addDays(bwd,-14);
    else if (frequency==='Monthly')       bwd=addMonths(bwd,-1);
    else if (frequency==='Quarterly')     bwd=addMonths(bwd,-3);
    else if (frequency==='Annually')      bwd=addMonths(bwd,-12);
    if (bwd<start) break;
    add(bwd); bc++;
  }
  return results;
}

function buildChartData(account) {
  const acct = state.accounts.find(a=>(a.nickname||a.name)===account);
  if (!acct) return { daily:[], income:0, expenseTotal:0, remainder:0 };
  const startBalance = parseFloat(acct.balance)||0;
  // Always start charts from today, regardless of balanceDate
  const chartStart = today(); chartStart.setHours(0,0,0,0);
  // balanceDate is used to roll the balance forward to today if it is in the past
  const base = acct.balanceDate ? parseDate(acct.balanceDate) : today();
  base.setHours(0,0,0,0);
  const txns = [];
  state.incomes.forEach(i=>expandRecurring(i,'income').forEach(t=>{ if(t.account===account) txns.push(t); }));
  state.expenses.forEach(e=>expandRecurring(e,'expense').forEach(t=>{ if(t.account===account) txns.push(t); }));
  state.variables.forEach(v=>{ if(!v.account||!v.amount||!v.date||v.account!==account) return; const s=v.type==='Expense'?-1:1; txns.push({account,amount:parseFloat(v.amount)*s,date:parseDate(v.date)}); });
  // Roll balance forward from balanceDate to today, applying any transactions that fall in between
  let bal=startBalance;
  if(base < chartStart){
    let d=new Date(base);
    while(d < chartStart){
      txns.forEach(t=>{ const td=parseDate(t.date); td.setHours(0,0,0,0); if(td.getTime()===d.getTime()) bal+=t.amount; });
      d=addDays(d,1); d.setHours(0,0,0,0);
    }
  }
  // Build daily array starting from today
  const daily=[];
  for(let i=0;i<366;i++){
    const d=addDays(chartStart,i); d.setHours(0,0,0,0);
    txns.forEach(t=>{ const td=parseDate(t.date); td.setHours(0,0,0,0); if(td.getTime()===d.getTime()) bal+=t.amount; });
    daily.push({date:new Date(d),balance:Math.round(bal*100)/100,label:`${d.getMonth()+1}/${d.getDate()}`});
  }
  const nmStart=addDays(eom(today(),0),1); nmStart.setHours(0,0,0,0);
  const nmEnd=eom(today(),1); nmEnd.setHours(23,59,59,999);
  let income=0,expenseTotal=0;
  txns.forEach(t=>{ const td=parseDate(t.date); if(!td) return; td.setHours(0,0,0,0); if(td>=nmStart&&td<=nmEnd){ if(t.amount>0) income+=t.amount; else expenseTotal+=Math.abs(t.amount); } });
  return {daily, income, expenseTotal, remainder:income-expenseTotal};
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg, type='success') {
  const id='t'+Date.now();
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<span>${type==='success'?'✓':'✕'}</span> ${esc(msg)}`;
  el.id=id;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(()=>{ const e=document.getElementById(id); if(e) e.remove(); },3000);
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function showModal(html, onClose) {
  const overlay=document.createElement('div');
  overlay.className='overlay';
  overlay.id='modalOverlay';
  overlay.innerHTML=`<div class="modal"><div class="modal-body" style="overflow:visible">${html}</div></div>`;
  overlay.addEventListener('click', e=>{ if(e.target===overlay){ closeModal(); if(onClose) onClose(); } });
  document.body.appendChild(overlay);
  // Auto-focus the first text/number/date input in the modal
  setTimeout(()=>{
    const first=overlay.querySelector('input:not([type="checkbox"]):not([type="hidden"])');
    if(first) first.focus();
  }, 50);
  // Enter key triggers the primary save button (not on textarea/select)
  overlay._keyHandler = e => {
    if(e.key==='Enter' && e.target.tagName!=='TEXTAREA' && e.target.tagName!=='SELECT') {
      e.preventDefault();
      const saveBtn = overlay.querySelector('button[id^="save"]');
      if(saveBtn) saveBtn.click();
    }
    if(e.key==='Escape') { closeModal(); if(onClose) onClose(); }
  };
  document.addEventListener('keydown', overlay._keyHandler);
}
function closeModal() {
  const m=document.getElementById('modalOverlay');
  if(m){ document.removeEventListener('keydown', m._keyHandler); m.remove(); }
}

function confirmModal(msg, onConfirm) {
  showModal(`
    <h3>Confirm</h3>
    <p class="confirm-text">${esc(msg)}</p>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">${t('cancelLabel')}</button>
      <button class="btn btn-danger" id="confirmBtn">${t('deleteLabel')}</button>
    </div>
  `);
  document.getElementById('confirmBtn').onclick=()=>{ closeModal(); onConfirm(); };
}

        <div class="summary-card kpi-card"><div class="kpi-label">${t('nextMonthExpenses')}</div><div class="kpi-value" style="color:var(--expense)">${fmt(expenseTotal)}</div></div>
        <div class="summary-card kpi-card"><div class="kpi-label">${t('remainder')}</div><div class="kpi-value" style="color:var(--remainder)">${fmt(remainder)}</div></div>
      </div>
      <div class="charts-row">
        <div class="chart-card">
          <h3>${t('next7')}</h3>
          <div class="chart-container"><canvas id="chart7" height="160"></canvas></div>
        </div>
        <div class="chart-card">
          <h3>${t('incomeVsExpense')}</h3>
          <div class="chart-container"><canvas id="chartDonut" height="160"></canvas></div>
        </div>
      </div>
      <div class="chart-card chart-card-full">
        <h3>${t('next12')}${hasSnap?' '+t('vsSnapshot'):''}</h3>
        <div class="chart-container"><canvas id="chart12" height="180"></canvas></div>
      </div>
      <div class="charts-row">
        <div class="chart-card">
          <h3>${t('expensesByCat')}</h3>
          <div class="chart-container"><canvas id="chartCat" height="220"></canvas></div>
        </div>
        <div class="chart-card">
          <h3>${t('incomeByCat')}</h3>
          <div class="chart-container"><canvas id="chartIncomeCat" height="220"></canvas></div>
        </div>
      </div>
    </div>
  `;

  // Chart defaults
  Chart.defaults.font.family="'Inter', sans-serif";
  Chart.defaults.color='#8a96a3';

  // ── Segment color helper: teal above zero, red below ──
  const segColor = (ctx, pos, neg) => {
    const v0=ctx.p0.parsed.y, v1=ctx.p1.parsed.y;
    if(v0<0&&v1<0) return neg;
    if(v0>=0&&v1>=0) return pos;
    return v1<v0?neg:pos;
  };

  // 7-day line chart
  destroyChart('chart7');
  const canvas7=document.getElementById('chart7');
  chartInstances['chart7']=new Chart(canvas7,{
    type:'line',
    data:{labels:next7.map(d=>d.label),datasets:[{
      data:next7.map(d=>d.balance),
      borderWidth:2, pointRadius:1, pointHoverRadius:3, pointBackgroundColor:'#00c49a', pointBorderColor:'#00c49a', tension:0, fill:false,
      segment:{
        borderColor:ctx=>segColor(ctx,'#00c49a','#e05252'),
      }
    }]},
    options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.raw)}}},scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{callback:v=>(Math.abs(v)>=1000?'$'+Math.round(v/1000)+'k':fmt(v))}}}}
  });

  // Donut
  destroyChart('chartDonut');
  const donutData=income===0&&expenseTotal===0?[0.01,0.01,0.01]:[income||0.01,expenseTotal||0.01,remainder||0.01];
  chartInstances['chartDonut']=new Chart(document.getElementById('chartDonut'),{
    type:'doughnut',
    data:{labels:['Income','Expenses','Remainder'],datasets:[{data:donutData,backgroundColor:['rgba(0,196,154,0.85)','rgba(224,82,82,0.85)','rgba(58,123,213,0.85)'],borderColor:['#00c49a','#e05252','#3a7bd5'],borderWidth:1.5,hoverOffset:4}]},
    options:{responsive:true,cutout:'62%',plugins:{legend:{position:'right',labels:{boxWidth:10,padding:12,font:{size:12}}},tooltip:{callbacks:{label:c=>c.label+': '+fmt(c.raw===0.01?0:c.raw)}}}}
  });

  // 12-month
  destroyChart('chart12');
  const canvas12=document.getElementById('chart12');
  const datasets=[{
    label:t('projected'),
    data:monthly.map(d=>d.balance),
    borderWidth:2, pointRadius:0, tension:0, fill:false,
    segment:{
      borderColor:ctx=>segColor(ctx,'#00c49a','#e05252'),
    }
  }];
  if(hasSnap&&state.snapshot.length){
    const snapMonthly=state.snapshot.filter((_,i)=>i%7===0);
    datasets.push({label:t('snapshot').replace('📷 ',''),data:snapMonthly.map(d=>d.balance),borderColor:'#e05252',backgroundColor:'rgba(224,82,82,0)',borderWidth:1.5,pointRadius:0,tension:0,borderDash:[5,3]});
  }
  chartInstances['chart12']=new Chart(canvas12,{
    type:'line',
    data:{labels:monthly.map(d=>d.label),datasets},
    options:{responsive:true,plugins:{legend:{display:hasSnap,labels:{boxWidth:10,padding:12,font:{size:12}}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmt(c.raw)}}},scales:{x:{grid:{display:false},ticks:{maxTicksLimit:12}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{callback:v=>(Math.abs(v)>=1000?'$'+Math.round(v/1000)+'k':fmt(v))}}}}
  });

  // ── Next Month's Expenses by Category pie chart ───────────────────────────────
  destroyChart('chartCat');
  const catMap={};
  const nmStart2=addDays(eom(today(),0),1); nmStart2.setHours(0,0,0,0);
  const nmEnd2=eom(today(),1); nmEnd2.setHours(23,59,59,999);
  // Fixed expenses — next month occurrences for this account
  state.expenses.forEach(exp=>{
    if((exp.account||'')===(state.selectedAccount||'')&&exp.max&&exp.category){
      const txns=expandRecurring(exp,'expense');
      txns.forEach(t=>{
        const td=new Date(t.date); td.setHours(0,0,0,0);
        if(td>=nmStart2&&td<=nmEnd2){
          catMap[exp.category]=(catMap[exp.category]||0)+Math.abs(parseFloat(exp.max)||0);
        }
      });
    }
  });
  // Variable expenses in next month for this account
  state.variables.forEach(v=>{
    if(v.type==='Expense'&&(v.account||'')===(state.selectedAccount||'')&&v.amount&&v.category&&v.date){
      const td=parseDate(v.date); td.setHours(0,0,0,0);
      if(td>=nmStart2&&td<=nmEnd2){
        catMap[v.category]=(catMap[v.category]||0)+Math.abs(parseFloat(v.amount)||0);
      }
    }
  });
  const catLabels=Object.keys(catMap).sort((a,b)=>catMap[b]-catMap[a]);
  const catValues=catLabels.map(k=>catMap[k]);
  // Generate a distinct palette cycling through hues
  const catColors=catLabels.map((_,i)=>{
    const hue=Math.round((i*137.508)%360); // golden angle spacing
    return `hsl(${hue},55%,52%)`;
  });
  if(catLabels.length===0){
    const el=document.getElementById('chartCat');
    if(el) el.parentElement.innerHTML=`<div style="text-align:center;color:var(--text3);padding:32px;font-size:13px">${t('noExpenseData')}</div>`;
  } else {
    chartInstances['chartCat']=new Chart(document.getElementById('chartCat'),{
      type:'pie',
      data:{
        labels:catLabels,
        datasets:[{data:catValues,backgroundColor:catColors,borderColor:'#fff',borderWidth:2,hoverOffset:6}]
      },
      options:{
        responsive:true,
        plugins:{
          legend:{position:'right',labels:{boxWidth:12,padding:14,font:{size:12},generateLabels:chart=>{
            const ds=chart.data.datasets[0];
            return chart.data.labels.map((label,i)=>({
              text:`${label} — ${fmt(ds.data[i])}`,
              fillStyle:ds.backgroundColor[i],
              strokeStyle:ds.borderColor,
              lineWidth:1,
              index:i
            }));
          }}},
          tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.raw)}`}}
        }
      }
    });
  }

  // ── Next Month's Income by Category pie chart ─────────────────────────────────
  destroyChart('chartIncomeCat');
  const incCatMap={};
  // Recurring income — next month occurrences for this account
  state.incomes.forEach(inc=>{
    if((inc.account||'')===(state.selectedAccount||'')&&inc.max&&inc.category){
      const txns=expandRecurring(inc,'income');
      txns.forEach(t=>{
        const td=new Date(t.date); td.setHours(0,0,0,0);
        if(td>=nmStart2&&td<=nmEnd2){
          incCatMap[inc.category]=(incCatMap[inc.category]||0)+Math.abs(parseFloat(inc.max)||0);
        }
      });
    }
  });
  // Variable income in next month for this account
  state.variables.forEach(v=>{
    if(v.type==='Income'&&(v.account||'')===(state.selectedAccount||'')&&v.amount&&v.category&&v.date){
      const td=parseDate(v.date); td.setHours(0,0,0,0);
      if(td>=nmStart2&&td<=nmEnd2){
        incCatMap[v.category]=(incCatMap[v.category]||0)+Math.abs(parseFloat(v.amount)||0);
      }
    }
  });
  const incLabels=Object.keys(incCatMap).sort((a,b)=>incCatMap[b]-incCatMap[a]);
  const incValues=incLabels.map(k=>incCatMap[k]);
  const incColors=incLabels.map((_,i)=>{
    const hue=Math.round((i*137.508+60)%360); // offset from expense palette
    return `hsl(${hue},55%,52%)`;
  });
  if(incLabels.length===0){
    const el=document.getElementById('chartIncomeCat');
    if(el) el.parentElement.innerHTML=`<div style="text-align:center;color:var(--text3);padding:32px;font-size:13px">${t('noIncomeData')}</div>`;
  } else {
    chartInstances['chartIncomeCat']=new Chart(document.getElementById('chartIncomeCat'),{
      type:'pie',
      data:{
        labels:incLabels,
        datasets:[{data:incValues,backgroundColor:incColors,borderColor:'#fff',borderWidth:2,hoverOffset:6}]
      },
      options:{
        responsive:true,
        plugins:{
          legend:{position:'right',labels:{boxWidth:12,padding:14,font:{size:12},generateLabels:chart=>{
            const ds=chart.data.datasets[0];
            return chart.data.labels.map((label,i)=>({
              text:`${label} — ${fmt(ds.data[i])}`,
              fillStyle:ds.backgroundColor[i],
              strokeStyle:ds.borderColor,
              lineWidth:1,
              index:i
            }));
          }}},
          tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.raw)}`}}
        }
      }
    });
  }
}

// ─── DOWNLOAD SAVE ────────────────────────────────────────────────────────────
function downloadSaveBrowser(){
  // Grab the entire current HTML source
  const src = document.documentElement.outerHTML;

  // Serialize current state
  const savedState = JSON.stringify({
    page: state.page,
    selectedAccount: state.selectedAccount,
    snapshot: state.snapshot.map(d=>({...d, date: d.date instanceof Date ? d.date.toISOString() : d.date})),
    accounts:  state.accounts,
    incomes:   state.incomes,
    expenses:  state.expenses,
    variables: state.variables
  });

  // Replace the initial state object in the source with the current state
  const updated = src.replace(
    /\/\/ ─── STATE ─+\nconst state = \{[\s\S]*?\};/,
    `// ─── STATE ${'─'.repeat(40)}\nconst state = ${savedState};`
  );

  // Trigger download
  const blob = new Blob([updated], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  const stamp = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  a.download = `budgit-${stamp}.html`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Saved! Open the downloaded file to continue where you left off.');
}
function downloadSave(){
  if(window.electronAPI){
    var payload = {
      accounts:  state.accounts,
      incomes:   state.incomes,
      expenses:  state.expenses,
      variables: state.variables,
      selectedAccount: state.selectedAccount,
      language: state.language
    };
    window.electronAPI.saveData(payload).then(function(){
      if(typeof toast==='function') toast("Saved to Documents/Budgit/budgit-save.json");
    }).catch(function(e){ if(typeof toast==='function') toast("Save failed","err"); });
  } else {
    downloadSaveBrowser();
  }
}

// ─── SHARE (EMAIL) ────────────────────────────────────────────────────────────
function shareBudgit(){
  // Serialize current state to JSON
  var payload = JSON.stringify({
    page: state.page,
    selectedAccount: state.selectedAccount,
    snapshot: state.snapshot.map(function(d){ return Object.assign({}, d, {date: d.date instanceof Date ? d.date.toISOString() : d.date}); }),
    accounts:  state.accounts,
    incomes:   state.incomes,
    expenses:  state.expenses,
    variables: state.variables
  });

  // Build a self-contained HTML that bootstraps with the saved state
  var bootstrapScript = '<script>window.__BUDGIT_SAVED_STATE__ = ' + payload + ';<\/script>';

  // Inject bootstrap before the main app script
  var src = document.documentElement.outerHTML;

  );

  var blob = new Blob([injected], {type: 'text/html'});
  var url  = URL.createObjectURL(blob);
  var d    = new Date();
  var stamp = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');

// Debounced window resize — forces all Chart.js instances to resize properly
// This fixes the issue where charts don't grow back after the window is enlarged
var _resizeTimer = null;
window.addEventListener('resize', function() {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(function() {
    Object.keys(chartInstances).forEach(function(id) {
      var chart = chartInstances[id];
      if (chart && chart.canvas) {
        // Reset the canvas size so Chart.js recalculates correctly
        var container = chart.canvas.parentElement;
        if (container) {

// ── FETCH BALANCES ON LAUNCH (once per day max) ────────────────────────────────
let balancesFetchedThisSession = false;

async function fetchBalancesOnLaunch() {
  if (balancesFetchedThisSession) return;
  if (state.bankConnections.length === 0) return;

  // Daily cache check — skip if already fetched today
  const today = new Date().toISOString().slice(0, 10);
  if (state.lastBalanceFetchDate === today) {
    console.log('Balances already fetched today — skipping API call');
    balancesFetchedThisSession = true;
    return;
  }

  const serverUp = await checkPlaidServer();
  if (!serverUp) { console.warn('Plaid server not available'); return; }
  try {
    const r = await fetch(`${PLAID_SERVER}/accounts/balance/get`, { method: 'POST' });
    const data = await r.json();
    if (!data.institutions) return;
    data.institutions.forEach(inst => {
      const conn = state.bankConnections.find(c => c.institutionId === inst.institution_id);
      if (!conn) return;
      if (inst.error) {
        conn.error = inst.error;
        conn.needsReconnect = inst.needs_reconnect || false;
        return;
      }
      conn.needsReconnect = false;
      conn.accounts = inst.accounts.map(a => ({
        account_id: a.account_id,
        name:    a.official_name || a.name,
        type:    a.subtype,
        mask:    a.mask,
        balance: a.balance != null ? a.balance : (a.available != null ? a.available : 0),
        mapToId: (conn.accounts.find(x => x.account_id === a.account_id || x.mask === a.mask) || {}).mapToId || '__new__',
      }));
      conn.lastSync = Date.now();
      conn.error = null;
      autoImportBalances({ id: inst.institution_id, name: inst.institution_name }, conn.accounts);
    });
    // Only save fetch date if we got actual balance data
    const hasRealBalances = data.institutions.some(inst =>
      !inst.error && (inst.accounts || []).some(a => (a.balance || a.available || 0) > 0)
    );
    if (hasRealBalances) {
      state.lastBalanceFetchDate = today;
    }
    balancesFetchedThisSession = true;
    render();
  } catch(e) { console.error('Balance fetch error:', e); }
}

function fmtSyncTime(ts) {
  if (!ts) return 'never';
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return new Date(ts).toLocaleDateString();
}

// ── OPEN PLAID LINK (real) ────────────────────────────────────────────────────
async function openPlaidLink() {
  const serverUp = await checkPlaidServer();
  if (!serverUp) {
    toast('Bank connection server not running. Please restart the app.', 'error');
    return;
  }
  try {
    // 1. Get a link_token from our local server
    const r = await fetch(`${PLAID_SERVER}/link/token/create`, { method: 'POST' });
    const data = await r.json();
    if (!data.link_token) {
      toast(data.error || 'Failed to start bank connection', 'error');
      return;
    }
    // 2. Open Plaid Link with the link_token
    const handler = window.Plaid.create({
      token: data.link_token,
      onSuccess: async (public_token, metadata) => {
        // Show connecting overlay immediately so UI doesn't look frozen
        showModal(`
          <div style="text-align:center;padding:24px 16px;">
            <div style="font-size:40px;margin-bottom:14px;">🔗</div>

            </div>
          </div>
        `);
        // Add animation keyframes if not already present
        if (!document.getElementById('connectingBarStyle')) {
          const s = document.createElement('style');
          s.id = 'connectingBarStyle';
          s.textContent = '@keyframes connectingBar{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}';
          document.head.appendChild(s);
        }
        await handlePlaidSuccess(public_token, metadata);
      },
      onExit: (err) => {
        if (err) toast('Connection cancelled: ' + (err.display_message || err.error_message || ''), 'error');
      },
    });
    handler.open();
  } catch(e) {
    toast('Could not connect to bank: ' + e.message, 'error');
  }
}

// ── HANDLE SUCCESSFUL PLAID LINK ──────────────────────────────────────────────
async function handlePlaidSuccess(public_token, metadata) {
  try {
    // Exchange public_token for access_token (stored securely on server)
    const r = await fetch(`${PLAID_SERVER}/item/public_token/exchange`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        public_token,
        institution_id:   metadata.institution.institution_id,
        institution_name: metadata.institution.name,
      }),
    });
    const data = await r.json();
    if (!data.ok) { toast(data.error || 'Token exchange failed', 'error'); return; }

    // Show account mapping modal
    showMappingModal(metadata);
  } catch(e) {
    toast('Connection error: ' + e.message, 'error');
  }
}

// ── FINALIZE CONNECTION ───────────────────────────────────────────────────────
async function finalizeConnection(inst, mappedAccounts) {
  try {
    // Short delay to ensure token is fully persisted on server
    await new Promise(r => setTimeout(r, 500));

    const r = await fetch(`${PLAID_SERVER}/accounts/balance/get`, { method: 'POST' });
    const data = await r.json();
    const instData = (data.institutions || []).find(i => i.institution_id === inst.institution_id);

    const accountsWithBalances = mappedAccounts.map(a => {
      let balance = 0;
      if (instData && !instData.error) {
        // Match by account_id first (unique), then fall back to mask
        const live = (instData.accounts || []).find(x =>
          (a.account_id && x.account_id === a.account_id) || x.mask === a.mask
        );
        if (live) {
          balance = live.balance != null ? live.balance :
                    (live.available != null ? live.available : 0);
        }
      }
      return {
        account_id: a.account_id || a.id,
        name:    a.name,
        type:    a.subtype || a.type,
        mask:    a.mask,
        balance,
        mapToId: a.mapToId,
      };
    });

    // Save connection to state
    const existing = state.bankConnections.findIndex(c => c.institutionId === inst.institution_id);
    const record = {
      institutionId:   inst.institution_id,
      institutionName: inst.name,
      accounts:        accountsWithBalances,
      lastSync:        Date.now(),
      error:           null,
    };
    if (existing >= 0) state.bankConnections[existing] = record;
    else state.bankConnections.push(record);

    autoImportBalances({ id: inst.institution_id, name: inst.name }, accountsWithBalances);
    balancesFetchedThisSession = true;
    toast(`${inst.name} connected — ${accountsWithBalances.length} account${accountsWithBalances.length!==1?'s':''} imported`);
    render();
  } catch(e) {
    toast('Connected but could not fetch balances: ' + e.message, 'error');
  }
}

// ── AUTO IMPORT BALANCES ──────────────────────────────────────────────────────
function autoImportBalances(inst, accounts) {
  accounts.forEach(a => {
    if (a.mapToId && a.mapToId !== '__new__') {
      const target = state.accounts.find(acc => String(acc.id) === String(a.mapToId));
      if (target) {
        target.balance     = String(((a.balance || 0) * 1).toFixed(2));
        target.balanceDate = new Date().toISOString().slice(0, 10);
        target.bankLinked  = true;
        target.bankInstId  = inst.id;
        target.bankMask    = a.mask;
        target.bankAccountId = a.account_id;
        return;
      }
    }
    // Create new account with clean name
    const cleanType = a.type ? a.type.charAt(0).toUpperCase() + a.type.slice(1) : 'Account';
    const shortName = inst.name.replace(' (US)', '').replace(' Bank', '');
    const label = `${inst.name} ${cleanType} ••••${a.mask}`;
    const nickname = `${shortName} ${cleanType}`;
    state.accounts.push({
      id:          Date.now() + Math.random(),
      name:        label,
      nickname:    nickname,
      balance:     String(((a.balance || 0) * 1).toFixed(2)),
      balanceDate: new Date().toISOString().slice(0, 10),
      notes:       `Auto-imported from ${inst.name}`,
      bankLinked:  true,
      bankInstId:  inst.id,
      bankMask:    a.mask,
      bankAccountId: a.account_id,
    });
  });
}

// ── SYNC BANK (manual) ────────────────────────────────────────────────────────
async function syncBank(institutionId) {
  const btn = document.getElementById('syncBtn-' + institutionId);
  if (btn) { btn.classList.add('syncing'); btn.disabled = true; }

  try {
    const r = await fetch(`${PLAID_SERVER}/accounts/balance/get`, { method: 'POST' });
    const data = await r.json();
    const instData = (data.institutions || []).find(i => i.institution_id === institutionId);
    const conn = state.bankConnections.find(c => c.institutionId === institutionId);
    if (!conn) return;

    if (instData && !instData.error) {
      conn.accounts.forEach(a => {
        const live = (instData.accounts || []).find(x =>
          (a.account_id && x.account_id === a.account_id) || x.mask === a.mask
        );
        if (live) {
          const bal = live.balance != null ? live.balance :
                      (live.available != null ? live.available : a.balance);
          a.balance = bal;
          // Update mapped Budg!t account
          let target = null;
          if (a.mapToId && a.mapToId !== '__new__') {
            target = state.accounts.find(acc => String(acc.id) === String(a.mapToId));
          }
          if (!target) {
            target = state.accounts.find(acc => acc.bankInstId === institutionId && acc.bankMask === a.mask);
          }
          if (target) {
            target.balance     = String(((bal || 0) * 1).toFixed(2));
            target.balanceDate = new Date().toISOString().slice(0, 10);
          }
        }
      });
      conn.lastSync = Date.now();
      conn.error = null;
      conn.needsReconnect = false;
      toast(`${conn.institutionName} synced — balances updated`);
    } else {
      if (instData && instData.needs_reconnect) {
        conn.needsReconnect = true;
        conn.error = 'Reconnection required';
        toast(`${conn.institutionName} needs to be reconnected — your bank credentials may have changed.`, 'error');
      } else {
        toast((instData && instData.error) || 'Sync failed', 'error');
      }
    }
    render();
  } catch(e) {
    console.error('Sync error:', e);
    toast('Sync error: ' + e.message, 'error');
  }
}

// ── DISCONNECT BANK ───────────────────────────────────────────────────────────
function disconnectBank(institutionId) {
  const conn = state.bankConnections.find(c => c.institutionId === institutionId);
  const name = conn ? conn.institutionName : 'this bank';
  confirmModal(`Disconnect ${name}? Linked Budg!t accounts will remain but will no longer auto-sync.`, async () => {
    try {
      await fetch(`${PLAID_SERVER}/item/remove`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ institution_id: institutionId }),
      });
    } catch(e) { /* server may be down, continue anyway */ }
    state.bankConnections = state.bankConnections.filter(c => c.institutionId !== institutionId);
    state.accounts.forEach(a => { if (a.bankInstId === institutionId) a.bankLinked = false; });
    toast(`${name} disconnected`);
    render();
  });
}
</script>

<script>
// ── CSV EXPORT / IMPORT ───────────────────────────────────────────────────────

// Export/Import buttons are on the Settings page

// ── HELPERS ───────────────────────────────────────────────────────────────────
function escapeCSV(val) {
  if (val === null || val === undefined) return '';
  var s = String(val);
  if (s.includes(',') || s.includes('"') || s.includes('\n')) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function rowToCSV(obj) {
  return Object.values(obj).map(escapeCSV).join(',');
}

function parseCSVLine(line) {
  var result = [], cur = '', inQuote = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') {
      if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
      else inQuote = !inQuote;
    } else if (ch === ',' && !inQuote) {
      result.push(cur); cur = '';
    } else {
      cur += ch;
    }
  }
  result.push(cur);
  return result;
}

function parseCSV(text) {
  var lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  var headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(function(line) {
    var vals = parseCSVLine(line);
    var obj = {};
    headers.forEach(function(h, i) { obj[h] = vals[i] || ''; });
    return obj;
  });
}

function buildCSVSection(label, items) {
  if (!items || !items.length) return '';
  var headers = Object.keys(items[0]).join(',');
  var rows = items.map(rowToCSV).join('\n');
  return '##' + label + '\n' + headers + '\n' + rows + '\n';
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function exportCSV() {
  var csv = '';
  csv += buildCSVSection('ACCOUNTS',  state.accounts  || []);
  csv += buildCSVSection('INCOMES',   state.incomes   || []);
  csv += buildCSVSection('EXPENSES',  state.expenses  || []);
  csv += buildCSVSection('VARIABLES', state.variables || []);

  var d = new Date();
  var stamp = d.getFullYear() + '-'
    + String(d.getMonth()+1).padStart(2,'0') + '-'
    + String(d.getDate()).padStart(2,'0');
  var filename = 'budgit-export-' + stamp + '.csv';

  if (window.electronAPI) {
    window.electronAPI.saveCSV(filename, csv).then(function(savedPath) {
      if (savedPath) alert('Exported to:\n' + savedPath);
    });
  } else {
    var blob = new Blob([csv], { type: 'text/csv' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  }
}

// ── IMPORT TRIGGER ────────────────────────────────────────────────────────────
function triggerImportCSV() {
  if (window.electronAPI) {
    window.electronAPI.openCSV().then(function(result) {
      if (result) processCSVImport(result.content, result.filename);
    });
  } else {
    document.getElementById('csvFileInput').click();
  }
}

function handleCSVImport(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) { processCSVImport(e.target.result, file.name); };
  reader.readAsText(file);
  event.target.value = '';
}

// ── PROCESS IMPORT (merge, skip duplicates by id) ─────────────────────────────
function processCSVImport(csvText, filename) {
  var sections = {}, currentSection = null, currentLines = [];

  csvText.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').forEach(function(line) {
    if (line.startsWith('##')) {
      if (currentSection && currentLines.length) {
        sections[currentSection] = currentLines.join('\n');
      }
      currentSection = line.slice(2).trim();
      currentLines = [];
    } else if (currentSection) {
      currentLines.push(line);
    }
  });
  if (currentSection && currentLines.length) {
    sections[currentSection] = currentLines.join('\n');
  }

  var counts = { added: 0, skipped: 0 };

  function mergeInto(stateKey, csvSection) {
    if (!sections[csvSection]) return;
    var imported = parseCSV(sections[csvSection]);
    var existing = state[stateKey] || [];
    var existingIds = new Set(existing.map(function(x) { return String(x.id); }));
    var toAdd = imported.filter(function(row) {
      return row.id && !existingIds.has(String(row.id));
    });
    // Cast numeric fields back
    toAdd = toAdd.map(function(row) {
      var out = Object.assign({}, row);
      if (out.id) out.id = isNaN(out.id) ? out.id : Number(out.id);
      return out;
    });
    counts.added   += toAdd.length;
    counts.skipped += (imported.length - toAdd.length);
    state[stateKey] = existing.concat(toAdd);
  }

  mergeInto('accounts',  'ACCOUNTS');
  mergeInto('incomes',   'INCOMES');
  mergeInto('expenses',  'EXPENSES');
  mergeInto('variables', 'VARIABLES');

  autoSave();
  if (typeof render === 'function') render();

  alert('Import complete!\n\n'
    + '✅ Added:   ' + counts.added   + ' records\n'
    + '⏭ Skipped: ' + counts.skipped + ' duplicates (same ID)');
}

// ── ELLIPSIS MENU ─────────────────────────────────────────────────────────────
function mi(icon, label){ return '<span class="menu-icon">'+icon+'</span>'+label; }

function accountMenu(id){
  return '<button onclick="accountForm(state.accounts.find(x=>x.id=='+id+'));closeMenus()">'+mi('✏','Edit')+'</button>'
    +'<button onclick="copyAccount('+id+');closeMenus()">'+mi('⎘','Duplicate')+'</button>'
    +'<div class="ellipsis-divider"></div>'
    +'<button class="danger" onclick="deleteAccount('+id+');closeMenus()">'+mi('✕','Delete')+'</button>';
}
function recurringMenu(type, id, idx){
  const arr = type==='income'?'state.incomes':'state.expenses';
  return '<button onclick="recurringForm(\''+type+'\','+arr+'['+idx+']);closeMenus()">'+mi('✏','Edit')+'</button>'
    +'<button onclick="copyRecurring(\''+type+'\','+id+');closeMenus()">'+mi('⎘','Duplicate')+'</button>'
    +'<div class="ellipsis-divider"></div>'
    +'<button class="danger" onclick="deleteRecurring(\''+type+'\','+id+');closeMenus()">'+mi('✕','Delete')+'</button>';
}
function variableMenu(id, idx){
  return '<button onclick="variableForm(state.variables['+idx+']);closeMenus()">'+mi('✏','Edit')+'</button>'
    +'<button onclick="copyVariable('+id+');closeMenus()">'+mi('⎘','Duplicate')+'</button>'
    +'<div class="ellipsis-divider"></div>'
    +'<button class="danger" onclick="deleteVariable('+id+');closeMenus()">'+mi('✕','Delete')+'</button>';
}

var _activeEllipsis = null;
function openMenu(btn, html){
  var menu = document.getElementById('floatingMenu');
  if(!menu) return;
  if(_activeEllipsis === btn){ closeMenus(); return; }
  closeMenus();
  _activeEllipsis = btn;
  btn.classList.add('active');
  menu.innerHTML = html;
  menu.style.display = 'block';
  var r = btn.getBoundingClientRect();
  var left = r.right - 160;
  if(left < 4) left = 4;
  menu.style.top = (r.bottom + 4) + 'px';
  menu.style.left = left + 'px';
}
function closeMenus(){
  var menu = document.getElementById('floatingMenu');
  if(menu){ menu.style.display='none'; menu.innerHTML=''; }
  if(_activeEllipsis){ _activeEllipsis.classList.remove('active'); _activeEllipsis=null; }
}
document.addEventListener('click', function(e){
  if(!e.target.closest('#floatingMenu') && !e.target.closest('.ellipsis-btn')) closeMenus();
});
document.addEventListener('scroll', closeMenus, true);

</script>
