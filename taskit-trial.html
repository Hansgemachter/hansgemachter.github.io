<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Task!t</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" id="faviconEl" type="image/png" href="">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef0f3;--surface:#fff;--surface2:#f4f5f7;--surface3:#e8eaed;
  --border:#d0d4da;--border2:#b0b6be;
  --accent:#00c49a;--accent-dark:#009e7c;--accent-light:#e0faf4;
  --sidebar:#1c2b3a;--text:#1c2b3a;--text2:#4a5568;--text3:#8a96a3;
  --danger:#e05252;--warn:#f59e0b;--info:#3a7bd5;
  --shadow:0 2px 12px rgba(28,43,58,.08);--shadow2:0 8px 32px rgba(28,43,58,.14);
  --radius:10px;--radius-sm:6px;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;min-width:240px;background:var(--sidebar);display:flex;flex-direction:column;overflow:hidden;z-index:50;flex-shrink:0;transition:transform .25s}
.sb-logo{padding:20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px}
.sb-logo h1{font-size:20px;color:#fff;font-weight:700;letter-spacing:-.4px}
.sb-logo .tag{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;font-family:var(--mono);margin-top:3px}
.sb-nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:13.5px;font-weight:500;color:rgba(255,255,255,.5);user-select:none;transition:background .15s}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.nav-item.active{background:var(--accent);color:#fff}
.nav-item .ni{display:flex;align-items:center;justify-content:center;width:20px;flex-shrink:0}
.nav-item .nc{margin-left:auto;background:rgba(255,255,255,.1);color:rgba(255,255,255,.5);font-family:var(--mono);font-size:11px;padding:1px 7px;border-radius:20px}
.nav-item.active .nc{background:rgba(255,255,255,.2);color:#fff}
.nav-divider{height:1px;background:rgba(255,255,255,.08);margin:8px 10px}
.nav-danger{color:rgba(224,82,82,.7)!important}
.nav-danger:hover{background:rgba(224,82,82,.15)!important;color:rgba(224,82,82,1)!important}
.sb-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08)}
.sb-footer p{font-size:11px;color:rgba(255,255,255,.2);font-family:var(--mono)}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40}
.sb-overlay.visible{display:block}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface);min-height:58px;flex-wrap:wrap}
.topbar h2{font-size:19px;font-weight:700;flex:1;min-width:0}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.content{flex:1;overflow-y:auto;padding:20px}
.hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;background:none;border:none;cursor:pointer;padding:6px 8px;border-radius:var(--radius-sm)}
.hamburger span{display:block;width:20px;height:2px;background:var(--text2);border-radius:2px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow)}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:6px}
.stat-val{font-family:var(--mono);font-size:26px;font-weight:500;color:var(--accent)}
.stat-val.red{color:var(--danger)}
.stat-prog{background:var(--surface3);border-radius:20px;height:7px;margin-top:6px}
.stat-prog div{background:var(--accent);height:100%;border-radius:20px}
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select,.toolbar-select{padding:8px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s}
.toolbar input:focus,.toolbar select:focus,.toolbar-select:focus{border-color:var(--accent)}
.toolbar input{flex:1;min-width:180px}
.toolbar-select{cursor:pointer;min-width:130px}
.toolbar-select:hover{border-color:var(--border2)}
.btn{padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);border:none;transition:all .15s;height:38px;box-sizing:border-box}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-dark)}
.btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.btn-share{display:flex;align-items:center;gap:7px;padding:8px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .15s;white-space:nowrap;color:var(--text2);height:38px;box-sizing:border-box}
.btn-share .share-icon{font-size:22px;line-height:0;vertical-align:middle}
.btn-share:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.btn-danger{background:rgba(224,82,82,.1);border:1px solid rgba(224,82,82,.3);color:var(--danger)}
.btn-danger:hover{background:rgba(224,82,82,.2)}
.icon-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 9px;cursor:pointer;color:var(--text3);font-size:22px;line-height:1;transition:all .15s}
.icon-btn:hover{border-color:var(--border2);color:var(--text)}
.icon-btn.del:hover{border-color:var(--danger);color:var(--danger)}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:560px}
thead tr{background:var(--surface2)}
th{padding:9px 14px;text-align:left;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--text);background:var(--surface3)}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
tr.pastdue td{background:#fff5f5!important}
tr.sel-row td{background:var(--accent-light)!important}
.td-name{color:var(--text);font-weight:500}
.td-mono{font-family:var(--mono);font-size:12px}
.td-actions{display:flex;gap:6px}
.ellipsis-wrap{display:inline-block}
.ellipsis-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 10px;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;transition:all .15s;letter-spacing:1px}
.ellipsis-btn:hover{border-color:var(--border2);color:var(--text);background:var(--surface2)}
.ellipsis-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
#floatingMenu{display:none;position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow2);z-index:9999;min-width:160px;padding:4px 0;white-space:nowrap}
#floatingMenu button{display:flex;align-items:center;gap:10px;width:100%;padding:8px 14px;background:none;border:none;cursor:pointer;font-size:13px;font-family:var(--font);color:var(--text2);text-align:left;transition:background .1s}
#floatingMenu button:hover{background:var(--surface2);color:var(--text)}
#floatingMenu button.danger{color:var(--danger)}
#floatingMenu button.danger:hover{background:rgba(224,82,82,.08)}
#floatingMenu .menu-icon{font-size:16px;width:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ellipsis-divider{height:1px;background:var(--border);margin:4px 0}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
.b-todo{background:#e8f0fe;color:#2d6be4}
.b-inprogress{background:#fff3cd;color:#856404}
.b-onhold{background:#fde8e8;color:#c0392b}
.b-complete{background:rgba(0,196,154,.15);color:var(--accent-dark)}
.b-canceled{background:#e2e3e5;color:#383d41}
.b-reopened{background:#fce4ff;color:#7b2d8b}
.b-high{background:#fde8e8;color:#c0392b}
.b-medium{background:#fff3cd;color:#856404}
.b-low{background:rgba(0,196,154,.13);color:var(--accent-dark)}
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty .ei{font-size:36px;margin-bottom:10px;opacity:.4}
.cb{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
.bulk-bar{display:flex;align-items:center;gap:10px;background:var(--accent-light);border:1px solid var(--accent);border-radius:var(--radius-sm);padding:8px 14px;margin-bottom:10px;font-size:13px;color:var(--accent-dark);font-weight:500;flex-wrap:wrap}
.bulk-bar span{margin-right:4px}
.bulk-btn{padding:5px 13px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:all .15s}
.bulk-btn-archive{background:var(--accent);color:#fff}
.bulk-btn-archive:hover{background:var(--accent-dark)}
.bulk-btn-delete{background:var(--danger);color:#fff}
.bulk-btn-delete:hover{background:#c0392b}
.bulk-btn-clear{background:none;border:1px solid var(--accent);color:var(--accent-dark)}
.bulk-btn-clear:hover{background:var(--accent);color:#fff}
.overlay{position:fixed;inset:0;background:rgba(28,43,58,.55);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);padding:16px;animation:fadeIn .15s}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:480px;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow2);animation:slideUp .2s cubic-bezier(.34,1.4,.64,1)}
.modal h3{font-size:17px;font-weight:700;margin-bottom:18px;flex-shrink:0}
.modal-body{overflow-y:auto;flex:1}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);flex-shrink:0}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
.form-grid{display:grid;gap:13px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3)}
.fc{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 11px;font-size:13.5px;color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s;width:100%}
.fc:focus{border-color:var(--accent)}
textarea.fc{resize:vertical;min-height:65px}
.email-preview{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;font-size:12px;font-family:var(--mono);line-height:1.7;max-height:200px;overflow-y:auto;white-space:pre-wrap}
.toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:200}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 16px;font-size:13px;color:var(--text);box-shadow:var(--shadow2);animation:slideUp .2s;display:flex;align-items:center;gap:9px}
.toast.ok{border-left:3px solid var(--accent)}
.toast.err{border-left:3px solid var(--danger)}
/* KANBAN */
.kanban-board{display:flex;gap:14px;overflow-x:auto;padding-bottom:12px;align-items:flex-start;min-height:calc(100vh - 140px)}
.kanban-col{flex:0 0 240px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;max-height:calc(100vh - 140px)}
.kanban-col-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-radius:var(--radius) var(--radius) 0 0}
.kanban-col-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.kanban-col-count{font-size:11px;font-family:var(--mono);background:rgba(0,0,0,.08);padding:2px 8px;border-radius:20px;color:inherit}
.kanban-cards{padding:8px;display:flex;flex-direction:column;gap:7px;overflow-y:auto;flex:1}
.kanban-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:grab;transition:box-shadow .15s,transform .15s,opacity .15s;user-select:none}
.kanban-card:active{cursor:grabbing}
.kanban-card.dragging{opacity:.4;transform:scale(.97)}
.kanban-col.drop-target{background:var(--accent-light);border-color:var(--accent)}
.kanban-card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.3}
.kanban-card-meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.kanban-card-due{font-size:10px;font-family:var(--mono);color:var(--text3)}
.kanban-card-due.overdue{color:var(--danger);font-weight:700}
.kanban-add-btn{margin:6px 8px 8px;padding:7px;background:none;border:1px dashed var(--border2);border-radius:7px;font-size:12px;color:var(--text3);cursor:pointer;text-align:center;transition:all .15s;flex-shrink:0}
.kanban-add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.kanban-empty{padding:16px 8px;text-align:center;color:var(--text3);font-size:12px;opacity:.6}
/* CALENDAR */
.cal-header{display:grid;text-align:center;border-bottom:1px solid var(--border);background:var(--surface2)}
.cal-header div{padding:8px 4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3)}
.cal-grid{display:grid;flex:1}
.cal-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px;min-height:100px;background:var(--surface);cursor:pointer;transition:background .1s}
.cal-cell:hover{background:var(--accent-light)}
.cal-cell.today{background:#f0fdf9}
.cal-cell.today .cal-day-num{background:var(--accent);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.cal-cell.other-month{background:var(--surface2)}
.cal-cell.other-month .cal-day-num{color:var(--text3)}
.cal-day-num{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.cal-task-pill{font-size:11px;padding:2px 6px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:500;display:block}
.cal-more{font-size:10px;color:var(--text3);padding:2px 4px;cursor:pointer}
.cal-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden}
/* SETTINGS */
.settings-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);max-width:520px}
@media(max-width:768px){
  .hamburger{display:flex}
  .sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);width:260px;min-width:260px}
  .sidebar.open{transform:translateX(0)}
  .stats-row{grid-template-columns:1fr 1fr}
  .content{padding:14px 12px}
}
@media(max-width:480px){
  .stats-row{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .stat-val{font-size:22px}
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
<script>
// ── ELECTRON AUTO-SAVE BRIDGE ─────────────────────────────────────────────────
// Loads data on startup. Auto-saves after every render() call (debounced).
var _autoSaveTimer = null;
function autoSave() {
  if (!window.electronAPI) return;
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(function() {
    window.electronAPI.saveData({ tasks: tasks, partners: partners, archive: archive })
      .catch(function(e) { console.error("Auto-save error:", e); });
  }, 400); // 400ms debounce — batches rapid changes into one write
}

// Patch render() to trigger auto-save after every call
var _originalRender = null;
window.addEventListener('DOMContentLoaded', function() {
  // Load saved data first
  if (window.electronAPI) {
    window.electronAPI.loadData().then(function(state) {
      if (state) {
        try {
          if (state.tasks)    tasks    = state.tasks;
          if (state.partners) partners = state.partners;
          if (state.archive)  archive  = state.archive;
        } catch(e) { console.error("Load error", e); }
      }
      render();
    });
  }
  // Wrap render() so every call triggers auto-save
  _originalRender = render;
  render = function() {
    _originalRender();
    autoSave();
  };
});
</script>
</head>

<script>
// ── LOGO ──────────────────────────────────────────────────────────────────────
var LOGO_SVG='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">'
  +'<rect width="180" height="180" fill="#00c49a"/>'
  +'<rect x="100" y="10" width="16" height="16" fill="#fff"/>'
  +'<rect x="122" y="10" width="16" height="16" fill="#fff"/>'
  +'<rect x="144" y="10" width="16" height="16" fill="#fff"/>'
  +'<rect x="100" y="32" width="16" height="16" fill="#fff"/>'
  +'<rect x="122" y="32" width="16" height="16" fill="#fff"/>'
  +'<rect x="144" y="32" width="16" height="16" fill="#fff"/>'
  +'<rect x="100" y="54" width="16" height="16" fill="#fff"/>'
  +'<rect x="122" y="54" width="16" height="16" fill="#fff"/>'
  +'<rect x="144" y="54" width="16" height="16" fill="#fff"/>'
  +'<rect x="154" y="100" width="14" height="42" rx="4" fill="#fff"/>'
  +'<rect x="154" y="150" width="14" height="14" rx="4" fill="#fff"/>'
  +'<ellipse cx="72" cy="118" rx="42" ry="38" fill="#fff"/>'
  +'<ellipse cx="68" cy="82" rx="28" ry="26" fill="#fff"/>'
  +'<ellipse cx="52" cy="44" rx="10" ry="26" fill="#fff" transform="rotate(-10 52 44)"/>'
  +'<ellipse cx="80" cy="38" rx="10" ry="28" fill="#fff" transform="rotate(10 80 38)"/>'
  +'<ellipse cx="48" cy="148" rx="14" ry="10" fill="#fff" transform="rotate(-20 48 148)"/>'
  +'<ellipse cx="90" cy="152" rx="14" ry="10" fill="#fff" transform="rotate(10 90 152)"/>'
  +'<ellipse cx="112" cy="118" rx="10" ry="10" fill="#fff"/>'
  +'<ellipse cx="78" cy="76" rx="4" ry="4" fill="#00c49a"/>'
  +'</svg>';

var LOGO_URL="data:image/svg+xml;base64,"+btoa(LOGO_SVG);

(function(){
  var canvas=document.createElement("canvas");
  canvas.width=180;canvas.height=180;
  var ctx=canvas.getContext("2d");
  var img=new Image();
  img.onload=function(){
    ctx.drawImage(img,0,0);
    var png=canvas.toDataURL("image/png");
    LOGO_URL=png;

// ── UTILS ─────────────────────────────────────────────────────────────────────
function today(){return new Date().toISOString().split("T")[0];}
function fmt(d){if(!d)return"—";var p=d.split("-");return new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function isPD(tk){return tk.dueDate&&tk.dueDate<today()&&tk.status!=="Complete"&&tk.status!=="Canceled";}
function dAs(p){return p.last?(p.mi?p.last+", "+p.first+" "+p.mi:p.last+", "+p.first):p.first;}
function nextId(a){return a.length?Math.max.apply(null,a.map(function(x){return x.id;}))+1:1;}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function sBadge(s){var m={"To Do":"todo","In Progress":"inprogress","On Hold":"onhold","Complete":"complete","Canceled":"canceled","Reopened":"reopened"};return'<span class="badge b-'+(m[s]||"todo")+'">'+esc(s)+"</span>";}
function pBadge(p){return'<span class="badge b-'+p.toLowerCase()+'">'+esc(p)+"</span>";}
function dateStr(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function pillColor(tk){var m={"To Do":"#e8f0fe;color:#2d6be4","In Progress":"#fff3cd;color:#856404","On Hold":"#fde8e8;color:#c0392b","Complete":"rgba(0,196,154,.15);color:#009e7c","Canceled":"#e2e3e5;color:#383d41","Reopened":"#fce4ff;color:#7b2d8b"};return m[tk.status]||"#eee;color:#333";}

// ── SORT ─────────────────────────────────────────────────────────────────────
function sortBy(sheet,col){
  if(sortState[sheet].col===col)sortState[sheet].dir*=-1;
  else{sortState[sheet].col=col;sortState[sheet].dir=1;}
  render();
}
function applySort(arr,sheet,colMap){
  var s=sortState[sheet];
  if(!s.col)return arr.slice();
  return arr.slice().sort(function(a,b){
    var av=colMap(a,s.col),bv=colMap(b,s.col);
    var an=parseFloat(String(av).replace(/[^0-9.-]/g,"")),bn=parseFloat(String(bv).replace(/[^0-9.-]/g,""));
    if(!isNaN(an)&&!isNaN(bn))return(an-bn)*s.dir;
    return String(av||"").localeCompare(String(bv||""))*s.dir;
  });
}
function th(sheet,col,label){
  var s=sortState[sheet],active=s.col===col;
  var arrow=active?(s.dir===1?" ▲":" ▼"):" ⇅";
  return'<th onclick="sortBy(\''+sheet+'\',\''+col+'\')" style="cursor:pointer;user-select:none">'+label
    +'<span style="font-size:9px;margin-left:4px;opacity:'+(active?1:.3)+';color:'+(active?'var(--accent)':'inherit')+'">'+arrow+'</span></th>';
}

// ── SELECTION ─────────────────────────────────────────────────────────────────
function toggleSel(sheet,id,checked){if(checked)selected[sheet].add(id);else selected[sheet].delete(id);render();}
function toggleSelAll(sheet,ids,checked){ids.forEach(function(id){if(checked)selected[sheet].add(id);else selected[sheet].delete(id);});render();}
function clearSel(sheet){selected[sheet]=new Set();render();}

function toast(msg,type){
  var id="t"+Date.now(),el=document.createElement("div");
  el.className="toast "+(type==="err"?"err":"ok");
  el.innerHTML="<span>"+(type==="err"?"✕":"✓")+"</span> "+esc(msg);
  el.id=id;
  document.getElementById("toastWrap").appendChild(el);
  setTimeout(function(){var e=document.getElementById(id);if(e)e.remove();},2800);
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(html){
  var ov=document.createElement("div");
  ov.className="overlay";ov.id="modalOv";
  ov.innerHTML='<div class="modal">'+html+'</div>';
  ov.addEventListener("click",function(e){if(e.target===ov)closeModal();});
  document.body.appendChild(ov);
  var first=ov.querySelector("input:not([type=checkbox])");
  if(first)setTimeout(function(){first.focus();},50);
  ov._kh=function(e){
    if(e.key==="Escape")closeModal();
    if(e.key==="Enter"&&e.target.tagName!=="TEXTAREA"&&e.target.tagName!=="SELECT"){
      e.preventDefault();var btn=ov.querySelector("button[id^=save]");if(btn)btn.click();
    }
  };
  document.addEventListener("keydown",ov._kh);
}
function closeModal(){var m=document.getElementById("modalOv");if(m){document.removeEventListener("keydown",m._kh);m.remove();}}
function confirmModal(msg,fn,btnLabel,btnClass){
  var label=btnLabel||"Delete";
  var cls=btnClass||"btn-danger";
  openModal('<h3>Confirm</h3><p style="color:var(--text2);line-height:1.6;margin-bottom:4px">'+esc(msg)+'</p>'
    +'<div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">'+t("cancel")+'</button>'
    +'<button class="btn '+cls+'" id="cfOk">'+label+'</button></div>');
  document.getElementById("cfOk").onclick=function(){closeModal();fn();};
}

function renderStats(){
  var open=tasks.filter(function(tk){return tk.status!=="Complete"&&tk.status!=="Canceled";});
  var pd=tasks.filter(isPD);
  var comp=tasks.filter(function(tk){return tk.status==="Complete";});
  var pct=tasks.length?Math.round(comp.length/tasks.length*100):0;
  var lc=comp.slice().sort(function(a,b){return b.completed>a.completed?1:-1;})[0];
  return'<div class="stats-row">'
    +'<div class="stat-card"><div class="stat-label">'+t("pastDue")+'</div><div class="stat-val'+(pd.length?" red":"")+'">'+pd.length+'</div></div>'
    +'<div class="stat-card"><div class="stat-label">'+t("allOpen")+'</div><div class="stat-val">'+open.length+'</div></div>'
    +'<div class="stat-card"><div class="stat-label">'+t("pctComplete")+'</div><div class="stat-val">'+pct+'%</div><div class="stat-prog"><div style="width:'+pct+'%"></div></div></div>'
    +'<div class="stat-card"><div class="stat-label">'+t("lastCompleted")+'</div><div style="font-size:15px;font-weight:700;color:var(--accent);margin-top:4px;font-family:var(--mono)">'+(lc?fmt(lc.completed):"—")+'</div></div>'
  +'</div>';
}

        +'<div class="fg"><label>'+t("dueDateLabel")+'</label><input class="fc" type="date" id="tmDue" value="'+esc(tk.dueDate||"")+'"></div>'
      +'</div>'

      +'<button class="btn btn-ghost" onclick="closeModal()">'+t("cancel")+'</button>'

    +'</div>'
  );
  document.getElementById("saveTask").onclick=doSaveTask;
}

function tmStatusChange(){
  var s=document.getElementById("tmStatus").value;
  if(s==="Complete"&&!document.getElementById("tmComp").value)document.getElementById("tmComp").value=today();
  if(s!=="Complete")document.getElementById("tmComp").value="";
  if(s==="In Progress"&&!document.getElementById("tmStart").value)document.getElementById("tmStart").value=today();
}

function doSaveTask(){
  var title=document.getElementById("tmTask").value.trim();
  if(!title){toast("Task title is required","err");return;}
  var obj={task:title,status:document.getElementById("tmStatus").value,priority:document.getElementById("tmPri").value,
    assignedTo:document.getElementById("tmAss").value,hours:parseFloat(document.getElementById("tmHrs").value)||0,
    startDate:document.getElementById("tmStart").value,dueDate:document.getElementById("tmDue").value,
    completed:document.getElementById("tmComp").value,notes:document.getElementById("tmNotes").value};
  if(editTaskId){
    var idx=tasks.findIndex(function(tk){return tk.id===editTaskId;});
    tasks[idx]=Object.assign({},tasks[idx],obj);toast("Task updated");
  } else {
    if(tasks.length>=100){toast("100 task limit reached","err");return;}
    obj.id=nextId(tasks);tasks.push(obj);toast("Task added");
  }
  closeModal();render();
}

function copyTask(id){
  if(tasks.length>=100){toast("100 task limit","err");return;}
  var tk=tasks.find(function(x){return x.id===id;});
  tasks.push(Object.assign({},tk,{id:nextId(tasks),task:tk.task+" (copy)"}));
  render();toast("Task copied");
}

function archiveTask(id){
  confirmModal("Move this task to the archive?",function(){
    if(archive.length>=1000){toast("Archive full","err");return;}
    var tk=tasks.find(function(x){return x.id===id;});
    archive.push(Object.assign({},tk,{id:nextId(archive),archivedOn:today()}));
    tasks=tasks.filter(function(x){return x.id!==id;});
    tasks.forEach(function(tk,i){tk.id=i+1;});
    render();toast("Task archived");
  },"Archive");
}

function archiveAllTasks(){
  if(!tasks.length){toast("No tasks to archive","err");return;}
  confirmModal("Archive ALL "+tasks.length+" task"+(tasks.length>1?"s":"")+"?",function(){
    tasks.forEach(function(tk){archive.push(Object.assign({},tk,{id:nextId(archive),archivedOn:today()}));});
    tasks=[];selected.tasks=new Set();toast("All tasks archived");render();
  },"Archive");
}

function bulkArchiveTasks(){
  var ids=Array.from(selected.tasks);
  if(!ids.length)return;
  confirmModal("Archive "+ids.length+" selected task"+(ids.length>1?"s":"")+"?",function(){
    ids.forEach(function(id){
      var tk=tasks.find(function(x){return x.id===id;});
      if(tk)archive.push(Object.assign({},tk,{id:nextId(archive),archivedOn:today()}));
    });
    tasks=tasks.filter(function(x){return!selected.tasks.has(x.id);});
    tasks.forEach(function(tk,i){tk.id=i+1;});
    selected.tasks=new Set();toast(ids.length+" task"+(ids.length>1?"s":"")+" archived");render();
  },"Archive");
}

function emailTask(id){
  var tk=tasks.find(function(x){return x.id===id;});
  var p=partners.find(function(p){return dAs(p)===tk.assignedTo;});
  if(!p||!p.email){toast("No email for this assignee","err");return;}
  var subj=tk.status+" Task – "+tk.task+" – Due "+fmt(tk.dueDate);
  var body="Hi "+p.first+",\n\nI have the following task assigned to you. Please respond back with any updates. Thanks!\n\nTitle: "+tk.task+"\nStatus: "+tk.status+"\nPriority: "+tk.priority+"\nEst. Duration: "+tk.hours+" hr(s).\nStart Date: "+(tk.startDate?fmt(tk.startDate):"(not populated)")+"\nDue Date: "+fmt(tk.dueDate)+"\n\nAdditional Notes:\n"+(tk.notes||"")+"\n\nSent from Task!t ©2020";
  emailData={to:p.email,subject:subj,body:body};
  openEmailModal();
}
function openEmailModal(){
  openModal('<h3>📧 Email Preview</h3><div class="modal-body"><div class="form-grid">'
    +'<div class="fg"><label>To</label><input class="fc" readonly value="'+esc(emailData.to)+'"></div>'
    +'<div class="fg"><label>Subject</label><input class="fc" readonly value="'+esc(emailData.subject)+'"></div>'
    +'<div class="fg"><label>Body</label><div class="email-preview">'+esc(emailData.body)+'</div></div>'
    +'<div class="fg" style="display:flex;align-items:center;gap:10px;padding:4px 0">'
      +'<input type="checkbox" id="attachIcoToggle" class="cb" style="flex-shrink:0">'
      +'<label for="attachIcoToggle" style="font-size:13px;color:var(--text2);cursor:pointer">Attach icon file <span style="font-size:11px;color:var(--text3);font-family:var(--mono)">(icon.ico)</span></label>'
    +'</div>'
    +'<p id="icoNote" style="display:none;font-size:11px;color:var(--text3);line-height:1.5;margin-top:-6px">The icon will be downloaded separately — attach it manually in your mail client after clicking Open in Mail Client.</p>'
    +'</div></div><div class="modal-footer">'
    +'<button class="btn btn-ghost" onclick="closeModal()">Close</button>'
    +'<button class="btn btn-primary" onclick="sendEmail()">📤 Open in Mail Client</button></div>');
  var toggle=document.getElementById('attachIcoToggle');
  var note=document.getElementById('icoNote');
  if(toggle&&note){
    toggle.addEventListener('change',function(){
      note.style.display=this.checked?'block':'none';

function smartSort(){
  var pri={High:3,Medium:2,Low:1};var td=new Date();
  tasks=tasks.map(function(tk){
    if(tk.status==="Complete"||tk.status==="Canceled")return Object.assign({},tk,{_s:-1});
    var due=tk.dueDate?new Date(tk.dueDate.replace(/-/g,"/")):null;
    var dl=due?(due-td)/86400000:999;
    var urg=dl<0?10:dl<3?8:dl<7?5:dl<14?3:1;
    return Object.assign({},tk,{_s:(pri[tk.priority]||1)*urg/Math.log((tk.hours||1)+1)});
  });
  tasks.sort(function(a,b){return b._s-a._s;});
  tasks.forEach(function(tk,i){tk.id=i+1;delete tk._s;});
  sortState.tasks={col:null,dir:1};
  render();toast("⚡ Tasks sorted by smart algorithm");
}

function kDrop(e,newStatus){

  document.querySelectorAll(".kanban-col").forEach(function(el){el.classList.remove("drop-target");});
  document.querySelectorAll(".kanban-card").forEach(function(el){el.classList.remove("dragging");});

  if(newStatus==="In Progress"&&!tk.startDate)tk.startDate=today();
  toast(esc(tk.task)+" → "+newStatus);render();
}

// ── CALENDAR ─────────────────────────────────────────────────────────────────
function calNav(dir){
  if(calView==="day")calDate.setDate(calDate.getDate()+dir);
  else if(calView==="week")calDate.setDate(calDate.getDate()+dir*7);
  else calDate.setMonth(calDate.getMonth()+dir);
  render();
}
function calGoToday(){calDate=new Date();calDate.setHours(0,0,0,0);render();}
function tasksOnDate(ds){
  return tasks.filter(function(tk){return tk.dueDate===ds;});
}

function renderCalendar(){
  var todayStr=dateStr(new Date());
  var label="";
  if(calView==="month")label=calDate.toLocaleDateString("en-US",{month:"long",year:"numeric"});
  else if(calView==="week"){var sun=new Date(calDate);sun.setDate(sun.getDate()-sun.getDay());var sat=new Date(sun);sat.setDate(sat.getDate()+6);label=sun.toLocaleDateString("en-US",{month:"short",day:"numeric"})+" – "+sat.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
  else label=calDate.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
  document.getElementById("pageTitle").textContent=t("calendar")+" — "+label;
  if(calView==="month")renderCalMonth(todayStr);
  else renderCalDayWeek(todayStr);
}

function renderCalMonth(todayStr){
  var yr=calDate.getFullYear(),mo=calDate.getMonth();
  var first=new Date(yr,mo,1),startDay=first.getDay(),dim=new Date(yr,mo+1,0).getDate();
  var DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var header='<div class="cal-header" style="grid-template-columns:repeat(7,1fr)">'+DAYS.map(function(d){return'<div>'+d+'</div>';}).join('')+'</div>';
  var cells="",total=Math.ceil((startDay+dim)/7)*7;
  for(var i=0;i<total;i++){
    var d=new Date(yr,mo,1+(i-startDay)),ds=dateStr(d),inMo=d.getMonth()===mo,isT=ds===todayStr;
    var dt=tasksOnDate(ds),maxShow=3;
    var pills=dt.slice(0,maxShow).map(function(tk){var bg=pillColor(tk);return'<div class="cal-task-pill" style="background:'+bg.split(";")[0]+';'+bg.split(";")[1]+'" onclick="openTaskModal('+tk.id+');event.stopPropagation()">'+esc(tk.task)+'</div>';}).join('');
    var more=dt.length>maxShow?'<div class="cal-more">+'+(dt.length-maxShow)+' more</div>':"";
    cells+='<div class="cal-cell'+(isT?" today":"")+((!inMo)?" other-month":"")+'" onclick="calDate=new Date(\''+ds.replace(/-/g,"/")+'\');calView=\'day\';render()">'
      +'<div class="cal-day-num">'+d.getDate()+'</div>'+pills+more+'</div>';
  }
  document.getElementById("mainContent").innerHTML='<div class="cal-wrap" style="height:calc(100vh - 120px)">'+header+'<div class="cal-grid" style="grid-template-columns:repeat(7,1fr);flex:1;overflow-y:auto">'+cells+'</div></div>';
}

function renderCalDayWeek(todayStr){
  var days=[];
  if(calView==="week"){var sun=new Date(calDate);sun.setDate(sun.getDate()-sun.getDay());for(var i=0;i<7;i++){var d2=new Date(sun);d2.setDate(sun.getDate()+i);days.push(d2);}}
  else days=[new Date(calDate)];
  var DNAMES=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var DSHORT=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  if(calView==="day"){

// ── CSV EXPORT / IMPORT ──────────────────────────────────────────────────────
function escapeCSV(val){
  if(val===null||val===undefined)return'';
  var s=String(val);
  if(s.includes(',')||s.includes('"')||s.includes('\n'))return'"'+s.replace(/"/g,'""')+'"';
  return s;
}
function rowToCSV(obj){return Object.values(obj).map(escapeCSV).join(',');}
function parseCSVLine(line){
  var result=[],cur='',inQuote=false;
  for(var i=0;i<line.length;i++){
    var ch=line[i];
    if(ch==='"'){if(inQuote&&line[i+1]==='"'){cur+='"';i++;}else inQuote=!inQuote;}
    else if(ch===','&&!inQuote){result.push(cur);cur='';}
    else cur+=ch;
  }
  result.push(cur);
  return result;
}
function parseCSV(text){
  var lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(function(l){return l.trim();});
  if(lines.length<2)return[];
  var headers=parseCSVLine(lines[0]);
  return lines.slice(1).map(function(line){
    var vals=parseCSVLine(line),obj={};
    headers.forEach(function(h,i){obj[h]=vals[i]||'';});
    return obj;
  });
}
function buildCSVSection(label,items){
  if(!items||!items.length)return'';
  var headers=Object.keys(items[0]).join(',');
  var rows=items.map(rowToCSV).join('\n');
  return'##'+label+'\n'+headers+'\n'+rows+'\n';
}
function exportCSV(){
  var csv='';
  csv+=buildCSVSection('TASKS',tasks||[]);
  csv+=buildCSVSection('PARTNERS',partners||[]);
  csv+=buildCSVSection('ARCHIVE',archive||[]);
  var d=new Date();
  var stamp=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  var filename='taskit-export-'+stamp+'.csv';
  var blob=new Blob([csv],{type:'text/csv'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('CSV exported!');
}
function triggerImportCSV(){
  document.getElementById('csvFileInput').click();
}
function handleCSVImport(event){
  var file=event.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){processCSVImport(e.target.result,file.name);};
  reader.readAsText(file);
  event.target.value='';
}
function processCSVImport(csvText,filename){
  var sections={},currentSection=null,currentLines=[];
  csvText.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').forEach(function(line){
    if(line.startsWith('##')){
      if(currentSection&&currentLines.length)sections[currentSection]=currentLines.join('\n');
      currentSection=line.slice(2).trim();
      currentLines=[];
    } else if(currentSection){
      currentLines.push(line);
    }
  });
  if(currentSection&&currentLines.length)sections[currentSection]=currentLines.join('\n');
  var counts={added:0,skipped:0};
  function mergeInto(arr,csvSection){
    if(!sections[csvSection])return arr;
    var imported=parseCSV(sections[csvSection]);
    var existingIds=new Set(arr.map(function(x){return String(x.id);}));
    var toAdd=imported.filter(function(row){return row.id&&!existingIds.has(String(row.id));});
    toAdd=toAdd.map(function(row){
      var out=Object.assign({},row);
      if(out.id)out.id=isNaN(out.id)?out.id:Number(out.id);
      if(out.hours!==undefined)out.hours=isNaN(out.hours)?out.hours:Number(out.hours);
      return out;
    });
    counts.added+=toAdd.length;
    counts.skipped+=(imported.length-toAdd.length);
    return arr.concat(toAdd);
  }
  tasks=mergeInto(tasks,'TASKS');
  partners=mergeInto(partners,'PARTNERS');
  archive=mergeInto(archive,'ARCHIVE');
  render();
  alert('Import complete!\n\n✅ Added:   '+counts.added+' records\n⏭ Skipped: '+counts.skipped+' duplicates (same ID)');
}

function downloadICS(id){
  var tk=tasks.find(function(x){return x.id===id;});
  if(!tk)return;
  function pad(n){return String(n).padStart(2,'0');}
  function icsDate(str){return str?str.replace(/-/g,''):null;}
  var now=new Date();
  var stamp=now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+'T'+pad(now.getHours())+pad(now.getMinutes())+pad(now.getSeconds())+'Z';
  var uid='taskit-'+tk.id+'-'+Date.now()+'@taskit';
  var due=icsDate(tk.dueDate);
  var start=icsDate(tk.startDate)||due;
  var desc='Status: '+tk.status+'; Priority: '+tk.priority+(tk.assignedTo?'; Assigned To: '+tk.assignedTo:'')+(tk.hours?'; Est. Hours: '+tk.hours:'')+(tk.notes?'; Notes: '+tk.notes:'');
  var lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Task!t//Task!t//EN','BEGIN:VEVENT','UID:'+uid,'DTSTAMP:'+stamp];
  if(start)lines.push('DTSTART;VALUE=DATE:'+start);
  if(due)lines.push('DTEND;VALUE=DATE:'+due);
  lines.push('SUMMARY:'+tk.task);
  lines.push('DESCRIPTION:'+desc.replace(/\n/g,' '));
  lines.push('STATUS:'+(tk.status==='Complete'?'COMPLETED':tk.status==='Canceled'?'CANCELLED':'NEEDS-ACTION'));
  lines.push('PRIORITY:'+(tk.priority==='High'?'1':tk.priority==='Medium'?'5':'9'));
  lines.push('END:VEVENT','END:VCALENDAR');
  var crlf='\r\n';
  var blob=new Blob([lines.join(crlf)],{type:'text/calendar;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(tk.task.replace(/[^a-z0-9]/gi,'-').toLowerCase()||'task')+'.ics';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Calendar event downloaded!');
}

// ── ELLIPSIS MENU HELPERS ────────────────────────────────────────────────────
var _activeEllipsis = null;

function openMenu(btn, html) {
  var menu = document.getElementById('floatingMenu');
  if (!menu) return;
  // If same button clicked again, close
  if (_activeEllipsis === btn) { closeMenus(); return; }
  closeMenus();
  _activeEllipsis = btn;
  btn.classList.add('active');
  menu.innerHTML = html;
  menu.style.display = 'block';
  // Position below the button, aligned to its right edge
  var r = btn.getBoundingClientRect();
  var menuW = 160;
  var left = r.right - menuW;
  if (left < 4) left = 4;
  menu.style.top = (r.bottom + 4) + 'px';
  menu.style.left = left + 'px';
}

function closeMenus() {
  var menu = document.getElementById('floatingMenu');
  if (menu) { menu.style.display = 'none'; menu.innerHTML = ''; }
  if (_activeEllipsis) { _activeEllipsis.classList.remove('active'); _activeEllipsis = null; }
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('#floatingMenu') && !e.target.closest('.ellipsis-btn')) closeMenus();
});
document.addEventListener('scroll', closeMenus, true);
